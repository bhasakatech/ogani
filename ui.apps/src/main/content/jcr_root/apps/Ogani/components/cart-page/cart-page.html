<sly data-sly-use.model="com.bhasaka.ogani.core.models.ProductCartModel"/>

<div class="cart-container">

    <table class="cart-table">
        <tr>
            <th>${model.productsLabel}</th>
            <th>${model.priceLabel}</th>
            <th class="quantity-header">${model.quantityLabel}</th>
            <th>${model.totalLabel}</th>
            <th></th>
        </tr>

        <sly data-sly-list.item="${model.productList}">
            <tr class="cart-row" data-price="${item.currentPrice}">

                <td class="product-info">
                    <img src="${item.image}" alt="${item.title}">
                    <span>${item.title}</span>
                </td>

                <td>$${item.currentPrice}</td>

                <td>
                    <div class="qty-box">
                        <button class="minus">-</button>
                        <input type="text" value="1" class="qty"/>
                        <button class="plus">+</button>
                    </div>
                </td>

                <td class="row-total">$${item.currentPrice}</td>

                <td>
                    <button class="remove">x</button>
                </td>

            </tr>
        </sly>

    </table>

    <div class="cart-actions">
        <button class="nav-btn" data-href="${model.continueShoppingLink @ extension='html'}">
            ${model.continueShoppingLabel}
        </button>

        <button class="nav-btn" data-href="${model.updateCartLink @ extension='html'}">
            ${model.updateCartLabel}
        </button>
    </div>

    <div class="coupon-section">
        <h4 class="coupon-title">Discount Codes</h4>
    </div>

    <div class="coupon">
        <input type="text" placeholder="${model.couponPlaceholder}" id="coupon-code">
        <button id="apply-coupon">${model.applyCouponLabel}</button>
    </div>

    <div class="cart-summary">
        <h3>${model.cartTotalLabel}</h3>
        <p>${model.subtotalLabel} <span id="subtotal">$0</span></p>
        <p>${model.totalSummaryLabel} <span id="total">$0</span></p>
        <button class="checkout nav-btn" data-href="${model.checkoutLink @ extension='html'}">
            ${model.checkoutLabel}
        </button>
    </div>

</div>
