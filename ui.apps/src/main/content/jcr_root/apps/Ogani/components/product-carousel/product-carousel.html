
<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>

<sly data-sly-call="${clientlib.css @ categories='Ogani.product-carousel'}"/>
<sly data-sly-call="${clientlib.js @ categories='Ogani.product-carousel'}"/>

<sly data-sly-use.model="com.Ogani.core.models.productCarousel.ProductCarouselModel"></sly>

<div class="product-carousel">

    <h2 class="section-title">Sale Off</h2>

    <div class="carousel-wrapper swiper">

        <div class="swiper-wrapper">

            <div class="swiper-slide" data-sly-list.product="${model.products}">

                <div class="product-card">

                    <div class="sale-badge">
                        -${product.discount}%
                    </div>

                    <div class="product-image">
                        <img src="${product.image}" alt="${product.title}" />
                    </div>

                    <div class="product-info">
                        <span class="category">${product.category}</span>
                        <h3>${product.title}</h3>

                        <div class="price">
                            <span class="current">$${product.currentPrice}</span>
                            <span class="original">$${product.originalPrice}</span>
                        </div>
                    </div>

                    <div class="actions">
                        <i class="fa fa-heart"></i>
                        <i class="fa fa-exchange"></i>
                        <button>Add to Cart</button>
                    </div>

                </div>

            </div>

        </div>

        <!-- Navigation -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>

    </div>

</div>
