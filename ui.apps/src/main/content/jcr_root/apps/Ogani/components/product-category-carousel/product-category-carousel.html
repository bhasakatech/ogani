<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"
     data-sly-call="${clientlib.all @ categories='Ogani.productcarousal-category'}"/>
    
<sly data-sly-use.model="com.bhasaka.ogani.core.models.CategoryCarouselModel" />
<div class="category-ogani-carousel">

    <sly data-sly-test="${model.categories.size == 0}">
        <p class="category-ogani-carousel-empty">No categories available</p>
    </sly>

    <sly data-sly-test="${model.categories.size > 0}">

        <!-- Navigation Buttons -->
        <button class="category-ogani-carousel-btn prev" aria-label="Previous">&#10094;</button>
        <button class="category-ogani-carousel-btn next" aria-label="Next">&#10095;</button>

        <div class="category-ogani-carousel-viewport">

            <div class="category-ogani-carousel-track">

                <sly data-sly-list.item="${model.categories}">
                    <div class="category-ogani-carousel-item">

                        <a href="${item.link}.html" class="category-ogani-carousel-link">

                            <div class="category-ogani-carousel-image">
                                <img src="${item.image @ context='uri'}"
                                     alt="${item.title}"
                                     loading="lazy" />
                            </div>

                            <div class="category-ogani-carousel-title">
                                <h3>${item.title}</h3>
                            </div>

                        </a>

                    </div>
                </sly>

            </div>

        </div>

    </sly>

</div>
