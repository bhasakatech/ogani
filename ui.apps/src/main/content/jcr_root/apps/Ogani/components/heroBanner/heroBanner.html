
<section class="breadcrumb-section"
         data-sly-use.model="com.bhasaka.ogani.core.models.HeroBanner"
         style="background-image: url(${model.backgroundImage @ context='uri'}); background-size: cover; background-position: center;">

    <div class="hero-banner__overlay" data-sly-test="${model.overlay}"></div>

    <div class="container" style="text-align: center;">
       
        <div class="breadcrumb__text">
            <h2>${model.title}</h2>
        </div>

       
        <div class="breadcrumb__option"
             data-sly-resource="${'breadcrumb' @ resourceType='core/wcm/components/breadcrumb/v2/breadcrumb'}">
        </div>
    </div>
</section>
