<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"
     data-sly-call="${clientlib.all @ categories='ogani.featured-products-container'}"/>

<sly data-sly-use.model="com.bhasaka.ogani.core.models.FeaturedProductsModel"/>

<!-- Header -->
<div class="featured-header">
    <h1>${model.sectionTitle}</h1>
</div>

<!-- Tabs -->
<div class="tabs">

    <button class="tab-btn active" data-category="all">All</button>

    <sly data-sly-list.category="${model.categories}">
        <button class="tab-btn" data-category="${category.tag}">
            ${category.name}
        </button>
    </sly>

</div>

<!-- Products -->
<div class="products">

    <sly data-sly-list.product="${model.products}">

        <div class="product-card"
            data-id="${product.title}"
            data-title="${product.title}"
            data-price="${product.price}"
            data-image="${product.image}"
            data-category="${product.categories @ join=','}">
            
            <!-- Image + Hover Actions Wrapper (IMPORTANT) -->
            <div class="product-img-wrapper">

                <img src="${product.image}" alt="${product.title}" />

                <div class="product-actions"
                     data-sly-test="${model.enableHoverActions}">
                     
                    <a href="#" class="action-btn wishlist-btn"><i class="icon_heart_alt"></i></a>
                    <a href="#" class="action-btn compare-btn"><i class="icon_refresh"></i></a>
                    <a href="#" class="action-btn cart-btn"><i class="icon_cart_alt"></i></a>

                </div>

            </div>

            <!-- Product Info -->
            <h3>${product.title}</h3>
            <p>$ ${product.price}</p>

        </div>

    </sly>

</div>
